<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- 圣诞套装 - 帽子在头顶，围巾在脖子 -->
  <!-- 圣诞帽（头顶） -->
  <polygon points="40,0 26,22 54,22" fill="#D32F2F"/>
  <polygon points="40,0 32,22 40,22" fill="#B71C1C"/>
  <!-- 帽檐白色毛边 -->
  <rect x="24" y="20" width="32" height="5" fill="#FFFFFF"/>
  <!-- 帽顶白球 -->
  <circle cx="40" cy="3" r="4" fill="#FFFFFF"/>
  <!-- 围巾（脖子位置） -->
  <rect x="20" y="42" width="40" height="8" fill="#D32F2F"/>
  <rect x="23" y="44" width="34" height="4" fill="#EF5350"/>
  <!-- 围巾下垂部分 -->
  <rect x="22" y="50" width="10" height="16" fill="#D32F2F"/>
  <rect x="24" y="52" width="6" height="12" fill="#EF5350"/>
  <!-- 围巾条纹 -->
  <rect x="22" y="56" width="10" height="2" fill="#FFFFFF"/>
  <rect x="22" y="60" width="10" height="2" fill="#FFFFFF"/>
</svg>