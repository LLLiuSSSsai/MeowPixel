  <!-- 胡须 -->
  <line x1="10" y1="38" x2="20" y2="40" stroke="#5A6474" stroke-width="1"/>
  <line x1="10" y1="42" x2="20" y2="43" stroke="#5A6474" stroke-width="1"/>
  <line x1="44" y1="40" x2="54" y2="38" stroke="#5A6474" stroke-width="1"/>
  <line x1="44" y1="43" x2="54" y2="42" stroke="#5A6474" stroke-width="1"/>
